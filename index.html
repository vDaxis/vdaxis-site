<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>что тут искать?</title>
    <style>
        body {
            background-color: #1e1f22;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .discord-card {
            background-color: #111214;
            width: 350px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.7);
            border: 1px solid #2b2d31;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .discord-card:hover {
            transform: scale(1.03);
            box-shadow: 0 15px 50px rgba(0,0,0,0.9);
        }

        .discord-banner {
            height: 100px;
            background-color: #141415;
            position: relative;
        }

        .discord-avatar-wrapper {
            position: absolute;
            top: 45px;
            left: 22px;
            background-color: #111214;
            padding: 6px;
            border-radius: 50%;
        }

        .discord-avatar {
            width: 95px;
            height: 95px;
            border-radius: 50%;
            display: block;
            background-color: #2b2d31;
            transition: transform 0.8s ease-in-out;
        }

        .discord-card:hover .discord-avatar {
            transform: rotate(360deg);
        }

        .discord-content {
            padding: 60px 22px 22px;
        }

        .discord-username {
            color: #f2f3f5;
            font-size: 24px;
            font-weight: 700;
            margin: 0;
        }

        .discord-id {
            color: #b5bac1;
            font-size: 16px;
            margin: 6px 0 20px;
            cursor: default;
        }

        .discord-separator {
            height: 1px;
            background-color: #2b2d31;
            margin-bottom: 20px;
        }

        .discord-button {
            display: block;
            width: 100%;
            background-color: #4f545c;
            color: #ffffff;
            text-align: center;
            padding: 12px 0;
            border-radius: 6px;
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            cursor: default;
            transition: background-color 0.2s ease;
        }

        .discord-card:hover .discord-button {
            background-color: #5d6269;
        }
    </style>
</head>
<body>

    <div class="discord-card">
        <div class="discord-banner">
            <div class="discord-avatar-wrapper">
                <img src="avatar.png" class="discord-avatar">
            </div>
        </div>
        
        <div class="discord-content">
            <h2 class="discord-username">vDaxis</h2>
            <p class="discord-id">vDaxis</p>
            <div class="discord-separator"></div>
            <div class="discord-button">Тут пусто...</div>
        </div>
    </div>

</body>
</html>
