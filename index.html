<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>что тут искать?</title>
<style>
    body {
        background-color: #1e1f22;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        font-family: sans-serif;
        -webkit-font-smoothing: antialiased;
    }

    .discord-card {
        background-color: #111214;
        width: 450px; 
        border-radius: 20px;
        overflow: hidden;
        box-shadow: 0 15px 50px rgba(0,0,0,0.8);
        border: 1px solid #2b2d31;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .discord-card:hover {
        transform: scale(1.05);
        box-shadow: 0 20px 60px rgba(0,0,0,1);
    }

    .discord-banner {
        height: 140px; 
        background-color: #141415;
        position: relative;
    }

    .discord-avatar-wrapper {
        position: absolute;
        top: 70px; 
        left: 30px;
        background-color: #111214;
        padding: 8px;
        border-radius: 50%;
    }

    .discord-avatar {
        width: 120px;
        height: 120px;
        border-radius: 50%;
        display: block;
        background-color: #2b2d31;
        transition: transform 0.8s ease-in-out;
    }

    .discord-card:hover .discord-avatar {
        transform: rotate(360deg);
    }

    .discord-content {
        padding: 70px 30px 30px; 
    }

    .discord-username {
        color: #f2f3f5;
        font-size: 32px; 
        font-weight: 700;
        margin: 0;
    }

    .discord-id {
        color: #b5bac1;
        font-size: 18px;
        margin: 8px 0 25px;
        cursor: default;
    }

    .discord-separator {
        height: 1px;
        background-color: #2b2d31;
        margin-bottom: 25px;
    }

    .discord-button {
        display: block;
        width: 100%;
        background-color: #4f545c;
        color: #ffffff;
        text-align: center;
        padding: 15px 0;
        border-radius: 8px;
        text-decoration: none;
        font-size: 18px;
        font-weight: 500;
        cursor: default;
        transition: background-color 0.2s ease;
    }

    .discord-card:hover .discord-button {
        background-color: #5d6269;
    }
</style>
</head>
<body>

    <div class="discord-card">
        <div class="discord-banner">
            <div class="discord-avatar-wrapper">
                <img src="avatar.png" class="discord-avatar">
            </div>
        </div>
        
        <div class="discord-content">
            <h2 class="discord-username">vDaxis</h2>
            <p class="discord-id">vDaxis</p>
            <div class="discord-separator"></div>
            <div class="discord-button">Тут пусто...</div>
        </div>
    </div>

</body>
</html>
